name: Deploy Azure Function - fn-telecomhw-bronze

on:
  push:
    branches:
      - main
    paths:
      - "02_data_engineering/bronze/function_app/**"
      - ".github/workflows/deploy_fn_telecomhw_bronze.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: 02_data_engineering/bronze/function_app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: fn-telecomhw-bronze
          package: 02_data_engineering/bronze/function_app
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}